                        if (prevActive && typeof prevActive.focus === 'function') {
                            try { prevActive.focus(); } catch {}
                        }
                    }
                    function onKey(e) {
                        if (e.key === 'Escape') {
                            if (!dismissible) { e.preventDefault(); return; }
                            e.preventDefault();
                            submit(cancelValue);
                            return;
                        }
                        if (e.key === 'Tab') {
                            const items = focusables(dialog);
                            if (items.length === 0) return;
                            const first = items[0], last = items[items.length - 1];
                            if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
                            else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
                            return;
                        }
                        if (e.key === 'Enter' && submitOnEnter && e.target.tagName === 'INPUT') {
                            e.preventDefault();
                            if (primaryBtn) primaryBtn.btn.click();
                        }
                    }

                    document.addEventListener('keydown', onKey, true);
                    currentClose = () => submit(cancelValue);

                    // Initial focus: honored autofocus, else first field, else first non-destructive button.
                    setTimeout(() => {
                        const autofocusEl = dialog.querySelector('[data-autofocus="1"]');
                        if (autofocusEl) { autofocusEl.focus(); return; }
                        const firstField = dialog.querySelector('.modal-field input');
                        if (firstField) { firstField.focus(); return; }
                        const safeBtn = btnEls.find(b => b.spec.kind !== 'danger');
                        if (safeBtn) safeBtn.btn.focus();
                    }, 0);
                });
            }

            async function confirm({ title, body, danger = false, confirmLabel = 'Confirm', cancelLabel = 'Cancel' }) {
                const res = await open({
                    title, body,
                    buttons: [
                        { label: cancelLabel, kind: 'default', value: false, autofocus: true },
                        { label: confirmLabel, kind: danger ? 'danger' : 'primary', value: true }
                    ],
                    dismissible: true
                });
                return res.button === true;
            }

            async function alert({ title, body, okLabel = 'OK' }) {
                await open({
                    title, body,
                    buttons: [{ label: okLabel, kind: 'primary', value: true, autofocus: true }],
                    dismissible: true
                });
            }

            async function prompt({ title, body, fields, confirmLabel = 'OK', cancelLabel = 'Cancel', danger = false, dismissible = true, validate = null }) {
                const res = await open({
                    title, body, fields, dismissible, submitOnEnter: true, validate,
                    buttons: [
                        { label: cancelLabel, kind: 'default', value: false },
                        { label: confirmLabel, kind: danger ? 'danger' : 'primary', value: true }
                    ]
                });
                if (res.button !== true) return null;
                return res.fields;
            }

            return { open, confirm, alert, prompt };
        })();

        function sanitizeState(s) {
            if (!Array.isArray(s.folders) || s.folders.length === 0) {
                s.folders = [{ id: generateId(), name: "General", isExpanded: true }];
            }
            if (!Array.isArray(s.notes)) s.notes = [];
            if (typeof s.searchQuery !== 'string') s.searchQuery = '';
            s.notes = s.notes.filter(n => !n.deletedAt || (now() - n.deletedAt) < TRASH_TTL_MS);
            s.notes.forEach(n => {
                if (!n.updatedAt) n.updatedAt = now();
                if (!s.folders.some(f => f.id === n.folderId)) n.folderId = s.folders[0]?.id;
            });
            return s;
        }

        function init() {
            const boot = loadBootVault();
            currentVault = boot.vault;

            // Encrypted vaults will get their real state once the user unlocks. Boot the store
            // with an empty shell so subscribers and renderers don't have to special-case null.
            let initialState = boot.state ? sanitizeState(boot.state) : freshState();

            bindUnlockForm();
            installActivityListeners();
            if (boot.locked) {
                isLocked = true;
                showLockOverlay('Enter your passphrase to unlock your notes.');
            }

            store = createStore(initialState);
            window.store = store; // test hook; `let` bindings aren't reachable via `window` otherwise

            // Subscriptions
            store.subscribe((state, action) => {
                // NOTE_UPDATE is the hot path (fires on every keystroke), so it only patches
                // the sidebar item in place — unless the folder changed, which requires the
                // note to move between lists and therefore a full tree render.
                const isLightweightUpdate = action.type === 'NOTE_UPDATE' && !('folderId' in (action.patch || {}));
                if (isLightweightUpdate) {
                    patchSidebarItem(state, action.id);
                } else {
                    renderTree(state);
                }
                patchEditorState(state);
            });

            syncChannel.onmessage = (e) => {
                // Ignore actions from other tabs while we're locked — our state is intentionally
                // wiped, and applying edits to freshState would corrupt what unlock rehydrates.
                if (isLocked) return;
                store.dispatchFromSync(e.data);
            };

            // Initial render
            const state = store.getState();
            if (localStorage.getItem('v4_theme') === 'dark') toggleTheme(true);
            renderTree(state);
            patchEditorState(state);

            // Arm the idle timer only once the vault mode is known and (in encrypted mode) unlocked.
            if (!boot.locked) resetIdleTimer();
        }

        // --- Actions & Dispatchers ---
        const dispatch = (action) => store.dispatch(action);

        function createNote(folderId) {
            dispatch({ type: 'NOTE_CREATE', id: generateId(), folderId, at: now() });
        }

        function createFolder() {
            dispatch({ type: 'FOLDER_CREATE', id: generateId() });
        }

        function handleInput() {
            const state = store.getState();
            if (!state.activeNoteId) return;
            const titleVal = document.getElementById('note-title').value;
            const contentVal = document.getElementById('note-content').value;
            dispatch({ type: 'NOTE_UPDATE', id: state.activeNoteId, patch: { title: titleVal, content: contentVal }, at: now() });
        }

        function handleSearch() {
            dispatch({ type: 'UI_SEARCH', query: document.getElementById('search-input').value.toLowerCase() });
        }

        function moveNote() {
            const state = store.getState();
            if(state.activeNoteId) dispatch({ type: 'NOTE_UPDATE', id: state.activeNoteId, patch: { folderId: document.getElementById('folder-select').value }, at: now() });
        }

        function softDeleteActiveNote() {
            const state = store.getState();
            if(state.activeNoteId) {
                lastDeletedNoteId = state.activeNoteId;
                dispatch({ type: 'NOTE_DELETE', id: state.activeNoteId, at: now() });
                showToast();
            }
        }

        function undoDelete() {
            if(lastDeletedNoteId) {
                dispatch({ type: 'NOTE_RESTORE', id: lastDeletedNoteId });
                document.getElementById('toast').classList.remove('visible');
                lastDeletedNoteId = null;
            }
        }

        function startFolderRename(folderId, currentName) {
            const titleDiv = document.querySelector(`.folder-header[data-id="${folderId}"] .folder-title`);
            if(!titleDiv) return;
            titleDiv.textContent = '';
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'folder-name-input';
            // Assigning the value property (instead of interpolating into innerHTML)
            // means quotes/angle brackets in folder names cannot inject markup.
            input.value = currentName;
            titleDiv.appendChild(input);
            input.focus();
            input.select();

            // Guard against double-dispatch: Enter triggers a re-render which removes
            // the input, which fires blur — without the flag we'd save twice.
            let done = false;
            const finish = (save) => {
                if (done) return;
                done = true;
                const newName = save ? (input.value.trim() || currentName) : currentName;
                dispatch({ type: 'FOLDER_UPDATE', id: folderId, patch: { name: newName } });
            };
            input.onblur = () => finish(true);
            input.onclick = (e) => e.stopPropagation();
            input.onkeydown = (e) => {
                e.stopPropagation(); // keep Enter/Escape from toggling the folder or the global handler
                if (e.key === 'Enter') finish(true);
                if (e.key === 'Escape') finish(false);
            };
        }

        // --- Renderers ---
        function renderTree(state) {
            // Keep the search box in sync with state (e.g. NOTE_CREATE clears the query)
            const searchInput = document.getElementById('search-input');
            if (document.activeElement !== searchInput) searchInput.value = state.searchQuery;

            const container = document.getElementById('tree-container');
            container.innerHTML = '';
            const activeNotes = state.notes.filter(n => !n.deletedAt);

            const visibleNotes = activeNotes.filter(n =>
                state.searchQuery === "" ||
                (n.title && n.title.toLowerCase().includes(state.searchQuery)) ||
                (n.content && n.content.toLowerCase().includes(state.searchQuery))
            );

            state.folders.forEach(folder => {
                const folderNotes = visibleNotes.filter(n => n.folderId === folder.id);
                if (state.searchQuery !== "" && folderNotes.length === 0) return;

                const wrapper = document.createElement('div');
                const header = document.createElement('div');
                header.className = 'folder-header';
                header.dataset.id = folder.id;
                header.tabIndex = 0;

                const isExpanded = state.searchQuery !== "" ? true : folder.isExpanded;

                const titleDiv = document.createElement('div');
                titleDiv.className = 'folder-title';
                const chevron = document.createElement('span');
                chevron.className = 'chevron';
                chevron.textContent = isExpanded ? '▾' : '▸';
                const nameSpan = document.createElement('span');
                nameSpan.textContent = folder.name;
                titleDiv.append(chevron, nameSpan);

                const actions = document.createElement('div');
                actions.className = 'folder-actions';

                const addBtn = document.createElement('button');
                addBtn.className = 'icon-btn'; addBtn.textContent = '+'; addBtn.title = 'Add Note Here';
                addBtn.onclick = (e) => { e.stopPropagation(); createNote(folder.id); };

                const editBtn = document.createElement('button');
                editBtn.className = 'icon-btn'; editBtn.textContent = '✎'; editBtn.title = 'Rename';
                editBtn.onclick = (e) => { e.stopPropagation(); startFolderRename(folder.id, folder.name); };

                const delBtn = document.createElement('button');
                delBtn.className = 'icon-btn delete'; delBtn.textContent = '✕'; delBtn.title = 'Delete';
                delBtn.setAttribute('aria-label', 'Delete folder ' + folder.name);
                delBtn.onclick = async (e) => {
                    e.stopPropagation();
                    if (store.getState().folders.length <= 1) {
                        await modal.alert({ title: 'Cannot delete', body: 'You must keep at least one folder.' });
                        return;
                    }
                    const notesInFolder = store.getState().notes.filter(n => n.folderId === folder.id && !n.deletedAt).length;
                    const bodyText = notesInFolder > 0
                        ? `"${folder.name}" contains ${notesInFolder} note${notesInFolder === 1 ? '' : 's'}. Deleting the folder moves them to the trash for 7 days before they are purged.`
                        : `Delete the empty folder "${folder.name}"?`;
                    const ok = await modal.confirm({
                        title: 'Delete folder?',
                        body: bodyText,
                        confirmLabel: 'Delete folder',
                        cancelLabel: 'Keep folder',
                        danger: true
                    });
                    if (ok) dispatch({ type: 'FOLDER_DELETE', id: folder.id, at: now() });
                };

                actions.append(addBtn, editBtn, delBtn);
                header.append(titleDiv, actions);

                const toggle = () => { if(store.getState().searchQuery === "") dispatch({type: 'FOLDER_UPDATE', id: folder.id, patch: {isExpanded: !folder.isExpanded}}); };
                header.onclick = toggle;
                header.onkeydown = (e) => { if(e.key === 'Enter') toggle(); };

                wrapper.appendChild(header);

                const list = document.createElement('ul');
                list.className = `notes-list ${isExpanded ? 'expanded' : ''}`;

                if (folderNotes.length === 0) {
                    list.innerHTML = `<li class="empty-folder">No notes inside</li>`;
                } else {
                    folderNotes.sort((a, b) => b.updatedAt - a.updatedAt).forEach(note => {
                        const li = document.createElement('li');
                        li.className = `note-item ${note.id === state.activeNoteId ? 'active' : ''}`;
                        li.dataset.id = note.id; li.tabIndex = 0;

                        const title = document.createElement('div'); title.className = 'note-item-title'; title.textContent = note.title || "Untitled Note";
                        const meta = document.createElement('div'); meta.className = 'note-item-meta';
                        meta.textContent = `${new Date(note.updatedAt).toLocaleDateString()} · ${noteSnippet(note)}`;

                        li.append(title, meta);
                        const select = (e) => { e.stopPropagation(); dispatch({type: 'NOTE_SELECT', id: note.id}); };
                        li.onclick = select; li.onkeydown = (e) => { if(e.key === 'Enter') select(e); };
                        list.appendChild(li);
                    });
                }
                wrapper.appendChild(list);
                container.appendChild(wrapper);
            });
        }

        function noteSnippet(note) {
            if (!note.content) return "Empty note";
            const flat = note.content.replace(/\s+/g, ' ').trim();
            return flat.substring(0, 30) + (flat.length > 30 ? "..." : "");
        }

        // Targeted DOM patcher for typing performance
        function patchSidebarItem(state, id) {
            const note = state.notes.find(n => n.id === id);
            const li = document.querySelector(`.note-item[data-id="${id}"]`);
            if(note && li) {
                li.querySelector('.note-item-title').textContent = note.title || "Untitled Note";
                li.querySelector('.note-item-meta').textContent = `${new Date(note.updatedAt).toLocaleDateString()} · ${noteSnippet(note)}`;
            }
        }

        function patchEditorState(state) {
            const emptyView = document.getElementById('empty-state-view');
            const editorView = document.getElementById('editor-view');
            const note = state.notes.find(n => n.id === state.activeNoteId && !n.deletedAt);

            if (note) {
                emptyView.style.display = 'none'; editorView.style.visibility = 'visible';

                // Only update inputs if they are not currently focused (prevents cursor jumping)
                const titleInput = document.getElementById('note-title');
                const contentInput = document.getElementById('note-content');
                if (document.activeElement !== titleInput) titleInput.value = note.title;
                if (document.activeElement !== contentInput) contentInput.value = note.content;

                // Don't rebuild the dropdown under the user's cursor while it's open
                const select = document.getElementById('folder-select');
                if (document.activeElement !== select) {
                    select.options.length = 0; // Clear XSS safely
                    state.folders.forEach(f => select.options.add(new Option(f.name, f.id)));
                    select.value = note.folderId;
                }

                const words = note.content.trim().split(/\s+/).filter(w => w.length > 0).length;
                document.getElementById('word-count').textContent = `${words} word${words === 1 ? '' : 's'}`;

                // Keep the preview in sync when typing or switching notes
                if (document.getElementById('preview-toggle').checked) renderMarkdown();
            } else {
                emptyView.style.display = 'flex'; editorView.style.visibility = 'hidden';
            }
        }

        // --- Utilities ---
        // Serialize the current state into a vault payload for localStorage / export. In plain mode
        // this is trivially the state; in encrypted mode this becomes AES-GCM ciphertext plus the
        // wrap metadata needed to unlock it on a fresh device. This function is the single point
        // where in-memory state becomes on-disk bytes, which makes it the correct place to enforce
        // "encrypted vaults must be unlocked to save."
        async function buildVaultPayload(state) {
            const savedAt = now();
            const mode = currentVault.security?.mode || 'plain';
            if (mode === 'plain') {
                return { vaultVersion: VAULT_VERSION, security: { mode: 'plain' }, state, savedAt };
            }
            if (mode === 'encrypted') {
                if (!currentDek) throw new Error('Encrypted vault is locked; cannot save');
                const plaintext = JSON.stringify(state);
                const { iv, data } = await cryptoUtils.encrypt(currentDek, plaintext);
                return {
                    vaultVersion: VAULT_VERSION,
                    security: currentVault.security,
                    ciphertext: { alg: 'AES-256-GCM', iv, data },
                    savedAt
                };
            }
            throw new Error('Unknown vault mode: ' + mode);
        }

        // saveToStorage is called synchronously from every dispatch (including keystrokes).
        // Plain mode writes inline. Encrypted mode chains async encryption behind a
        // latest-wins queue: rapid keystrokes coalesce into at most one in-flight save
        // plus one pending save, so we never queue up an unbounded backlog of encryptions
        // and the most recent state always ends up on disk.
        let encryptSavePending = null;
        let encryptSaveInFlight = false;
        function saveToStorage(state) {
            const mode = currentVault.security?.mode || 'plain';
            if (mode === 'plain') {
                try {
                    const payload = { vaultVersion: VAULT_VERSION, security: { mode: 'plain' }, state, savedAt: now() };
                    localStorage.setItem(VAULT_KEY, JSON.stringify(payload));
                    currentVault.savedAt = payload.savedAt;
                } catch(e) {}
                return;
            }
            encryptSavePending = state;
            if (encryptSaveInFlight) return;
            encryptSaveInFlight = true;
            (async () => {
                try {
                    while (encryptSavePending) {
                        const toSave = encryptSavePending;
                        encryptSavePending = null;
                        const payload = await buildVaultPayload(toSave);
                        try {
                            localStorage.setItem(VAULT_KEY, JSON.stringify(payload));
                            currentVault.savedAt = payload.savedAt;
                        } catch(e) {}
                    }
                } finally {
                    encryptSaveInFlight = false;
                }
            })();
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('visible');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('visible'), 5000);
        }

        function toggleTheme(forceDark) {
            const isDark = typeof forceDark === 'boolean' ? forceDark : document.documentElement.getAttribute('data-theme') === 'light';
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            localStorage.setItem('v4_theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-toggle').textContent = isDark ? 'Light Mode' : 'Dark Mode';
        }

        function togglePreview() {
            const isPreview = document.getElementById('preview-toggle').checked;
            document.getElementById('note-content').style.display = isPreview ? 'none' : 'block';
            document.getElementById('preview-layer').style.display = isPreview ? 'block' : 'none';
            if (isPreview) renderMarkdown();
        }

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function safeUrl(url) {
            return /^(https?:|mailto:)/i.test(url.trim()) ? url : '#';
        }

        function renderMarkdown() {
            const val = document.getElementById('note-content').value;
            // HTML is escaped *before* the markdown pass so note content can never
            // inject live markup into the preview layer. Link targets are restricted
            // to http(s)/mailto to block javascript: URLs.
            const html = escapeHtml(val)
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/\*\*(.*?)\*\*/gim, '<b>$1</b>')
                .replace(/\*(.*?)\*/gim, '<i>$1</i>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/gim, (m, text, url) => `<a href="${safeUrl(url)}" target="_blank" rel="noopener noreferrer" style="color:var(--primary)">${text}</a>`)
                .replace(/\n/gim, '<br>');
            document.getElementById('preview-layer').innerHTML = html;
        }

        // The "File-Over-App" Export Engine
        // Exports carry the same vault payload as localStorage — plain or encrypted, including
        // all wrap metadata — so an exported HTML opened cold on a new device is exactly as
        // protected as (and identically restorable as) the browser copy it came from.
        async function exportSelfContainedHtml() {
            const html = document.documentElement.cloneNode(true);
            const dataScript = html.querySelector('#app-data');

            let payload;
            try {
                payload = await buildVaultPayload(store.getState());
            } catch(err) {
                await modal.alert({
                    title: 'Vault is locked',
                    body: 'Unlock the vault before downloading — otherwise the exported file would not contain any of your notes.'
                });
                return;
            }

            // Escaping "<" as \u003c keeps a literal closing script tag inside note content
            // from terminating the data script tag and corrupting the exported file
            // (JSON.parse still decodes \u003c transparently).
            dataScript.textContent = JSON.stringify(payload).replace(/</g, '\\u003c');

            // Strip transient UI so the export is clean; init() re-renders on boot.
            html.querySelector('#tree-container').innerHTML = '';
            html.querySelector('#toast').classList.remove('visible');

            const blob = new Blob(['<!DOCTYPE html>\n' + html.outerHTML], {type: 'text/html'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            // Include time so exporting twice in one day doesn't silently overwrite.
            const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            a.download = `notes_v4_${ts}.html`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Global Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            // Manual lock. Encrypted mode is where this matters; in plain mode it's still
            // available (as a screen-hide), which is at worst harmless.
            if ((e.metaKey || e.ctrlKey) && e.shiftKey && (e.key === 'L' || e.key === 'l')) {
                e.preventDefault();
                lockApp('manual');
                return;
            }
            // Global shortcuts should not fire while the app is locked — the sidebar and editor
            // are inert but keydown still bubbles up here.
            if (isLocked) return;
            if ((e.metaKey || e.ctrlKey) && e.key === 'n') { e.preventDefault(); createNote(); document.getElementById('note-title').focus(); }
            if ((e.metaKey || e.ctrlKey) && e.key === '/') { e.preventDefault(); document.getElementById('search-input').focus(); }
            if (e.key === 'Escape') {
                // Only intercept Escape while searching — a global blur/clear would
                // steal Escape from the editor and the folder-rename input.
                const search = document.getElementById('search-input');
                if (document.activeElement === search) {
                    e.preventDefault();
                    search.value = '';
                    dispatch({type: 'UI_SEARCH', query: ''});
                    search.blur();
                }
            }
        });

        init();
    </script>
</body>
</html>
